<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 480" fill="none">
  <defs>
    <linearGradient id="androidBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#121212"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
  </defs>
  <!-- Body -->
  <rect x="12" y="4" width="216" height="472" rx="36" fill="#0a0a0a" stroke="#2a2a2a" stroke-width="2"/>
  <rect x="16" y="8" width="208" height="464" rx="32" fill="url(#androidBg)"/>
  <!-- Punch hole camera -->
  <circle cx="204" cy="30" r="5" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="0.5"/>
  <circle cx="204" cy="30" r="2" fill="#333"/>
  <!-- Status bar -->
  <text x="26" y="34" font-family="system-ui,sans-serif" font-size="9" font-weight="600" fill="#64748b">9:41</text>
  <text x="170" y="34" font-family="system-ui,sans-serif" font-size="9" fill="#01db5d">5G</text>
  <!-- Header -->
  <rect x="16" y="44" width="208" height="48" rx="0" fill="rgba(1,219,93,.06)"/>
  <text x="32" y="74" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#fff">&lt; SIM Manager</text>
  <!-- SIM row 1 -->
  <rect x="20" y="100" width="200" height="48" rx="10" fill="rgba(255,255,255,.04)"/>
  <text x="36" y="122" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#fff">SIM 1</text>
  <text x="36" y="138" font-family="system-ui,sans-serif" font-size="9" fill="#64748b">Physical SIM</text>
  <text x="176" y="122" font-family="system-ui,sans-serif" font-size="9" fill="#01db5d">Active</text>
  <!-- SIM row 2 -->
  <rect x="20" y="152" width="200" height="48" rx="10" fill="rgba(1,219,93,.08)"/>
  <text x="36" y="174" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#fff">SIM 2</text>
  <text x="36" y="190" font-family="system-ui,sans-serif" font-size="9" fill="#64748b">DataSafari eSIM</text>
  <text x="176" y="174" font-family="system-ui,sans-serif" font-size="9" fill="#01db5d">Data</text>
  <!-- Add eSIM button -->
  <rect x="20" y="210" width="200" height="42" rx="21" fill="#01db5d" opacity="0.9"/>
  <text x="120" y="235" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#0f172a" text-anchor="middle">+ Add eSIM</text>
  <!-- Data usage card -->
  <rect x="20" y="264" width="200" height="60" rx="10" fill="rgba(255,255,255,.03)"/>
  <text x="36" y="286" font-family="system-ui,sans-serif" font-size="11" font-weight="500" fill="#fff">Data usage</text>
  <text x="170" y="286" font-family="system-ui,sans-serif" font-size="11" fill="#01db5d">3.2 GB left</text>
  <rect x="36" y="294" width="168" height="4" rx="2" fill="rgba(255,255,255,.06)"/>
  <rect x="36" y="294" width="100" height="4" rx="2" fill="#01db5d"/>
  <text x="36" y="314" font-family="system-ui,sans-serif" font-size="8" fill="#64748b">Resets in 4 days</text>
  <!-- Roaming toggle -->
  <rect x="20" y="332" width="200" height="42" rx="10" fill="rgba(255,255,255,.03)"/>
  <text x="36" y="358" font-family="system-ui,sans-serif" font-size="11" font-weight="500" fill="#fff">Data roaming</text>
  <rect x="180" y="345" width="28" height="16" rx="8" fill="#01db5d"/>
  <circle cx="196" cy="353" r="6" fill="#fff"/>
  <!-- Preferred network -->
  <rect x="20" y="378" width="200" height="42" rx="10" fill="rgba(255,255,255,.03)"/>
  <text x="36" y="404" font-family="system-ui,sans-serif" font-size="11" font-weight="500" fill="#fff">Preferred network</text>
  <text x="170" y="404" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">5G / LTE</text>
  <!-- Hint -->
  <rect x="36" y="432" width="168" height="28" rx="8" fill="rgba(1,219,93,.06)"/>
  <text x="120" y="450" font-family="system-ui,sans-serif" font-size="8" fill="#01db5d" opacity="0.8" text-anchor="middle">Installs in under 2 minutes</text>
  <!-- Nav bar -->
  <rect x="40" y="466" width="160" height="2" rx="1" fill="rgba(255,255,255,.15)"/>
</svg>
