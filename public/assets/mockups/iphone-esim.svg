<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 484" fill="none">
  <defs>
    <linearGradient id="iphoneB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2a3a"/>
      <stop offset="100%" stop-color="#1a1a2a"/>
    </linearGradient>
    <linearGradient id="scrGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2f6"/>
    </linearGradient>
    <filter id="phoneShadow" x="-10%" y="-5%" width="120%" height="110%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <!-- Phone body -->
  <g filter="url(#phoneShadow)">
    <rect x="16" y="2" width="208" height="480" rx="44" fill="url(#iphoneB)" stroke="#3a3a4a" stroke-width="1.5"/>
    <!-- Side buttons -->
    <rect x="12" y="80" width="4" height="28" rx="2" fill="#2a2a3a"/>
    <rect x="12" y="120" width="4" height="48" rx="2" fill="#2a2a3a"/>
    <rect x="224" y="140" width="4" height="60" rx="2" fill="#2a2a3a"/>
    <!-- Screen -->
    <rect x="26" y="14" width="188" height="456" rx="34" fill="#fff"/>
    <rect x="26" y="14" width="188" height="456" rx="34" fill="url(#scrGrad)"/>
    <!-- Status bar area -->
    <rect x="26" y="14" width="188" height="40" rx="34" fill="#f8fafc"/>
    <rect x="26" y="14" width="188" height="40" fill="#f8fafc"/>
    <!-- Dynamic Island notch -->
    <rect x="90" y="6" width="60" height="24" rx="12" fill="#0f172a"/>
    <circle cx="108" cy="18" r="3" fill="#1e293b"/>
    <circle cx="120" cy="18" r="2" fill="#01db5d"/>
    <!-- Status bar items -->
    <text x="36" y="30" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#0f172a">9:41</text>
    <text x="176" y="30" font-family="system-ui,sans-serif" font-size="9" font-weight="600" fill="#64748b">5G</text>
    <!-- Nav bar -->
    <text x="36" y="50" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#0f172a">Cellular</text>
    <text x="164" y="50" font-family="system-ui,sans-serif" font-size="10" fill="#01db5d">&gt;</text>
    <!-- Add eSIM row -->
    <rect x="28" y="58" width="184" height="48" rx="8" fill="rgba(1,219,93,.08)"/>
    <text x="44" y="80" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#0f172a">Add eSIM</text>
    <text x="44" y="96" font-family="system-ui,sans-serif" font-size="9" fill="#64748b">Scan QR code</text>
    <!-- Settings rows -->
    <line x1="36" y1="122" x2="204" y2="122" stroke="#e2e8f0" stroke-width="0.5"/>
    <text x="36" y="138" font-family="system-ui,sans-serif" font-size="10" fill="#334155">Current Plan</text>
    <text x="154" y="138" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#01db5d">DataSafari</text>
    <line x1="36" y1="158" x2="204" y2="158" stroke="#e2e8f0" stroke-width="0.5"/>
    <text x="36" y="174" font-family="system-ui,sans-serif" font-size="10" fill="#334155">Data Roaming</text>
    <text x="178" y="174" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#01db5d">On</text>
    <line x1="36" y1="194" x2="204" y2="194" stroke="#e2e8f0" stroke-width="0.5"/>
    <text x="36" y="210" font-family="system-ui,sans-serif" font-size="10" fill="#334155">Network Selection</text>
    <text x="166" y="210" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">Auto</text>
    <!-- QR code preview -->
    <rect x="70" y="224" width="100" height="100" rx="10" fill="rgba(1,219,93,.04)" stroke="rgba(1,219,93,.2)" stroke-width="1" stroke-dasharray="3 3"/>
    <g transform="translate(90,244)" stroke="#01db5d" stroke-width="2">
      <rect x="0" y="0" width="16" height="16" rx="2" fill="none"/>
      <rect x="3" y="3" width="4" height="4" rx="0.5" fill="#01db5d" opacity="0.4"/>
      <rect x="12" y="3" width="2" height="2" rx="0.3" fill="#01db5d" opacity="0.4"/>
      <rect x="3" y="12" width="2" height="2" rx="0.3" fill="#01db5d" opacity="0.4"/>
      <rect x="24" y="0" width="16" height="16" rx="2" fill="none"/>
      <rect x="27" y="3" width="10" height="10" rx="1" fill="#01db5d" opacity="0.4"/>
      <rect x="0" y="24" width="16" height="16" rx="2" fill="none"/>
      <rect x="3" y="27" width="4" height="4" rx="0.5" fill="#01db5d" opacity="0.4"/>
      <rect x="12" y="27" width="2" height="2" rx="0.3" fill="#01db5d" opacity="0.4"/>
      <rect x="12" y="36" width="2" height="2" rx="0.3" fill="#01db5d" opacity="0.4"/>
      <rect x="24" y="24" width="6" height="6" rx="1" fill="#01db5d" opacity="0.4"/>
      <rect x="32" y="24" width="6" height="6" rx="1" fill="#01db5d" opacity="0.3"/>
      <rect x="24" y="32" width="6" height="6" rx="1" fill="#01db5d" opacity="0.3"/>
      <rect x="32" y="32" width="6" height="6" rx="1" fill="#01db5d" opacity="0.4"/>
    </g>
    <text x="120" y="372" font-family="system-ui,sans-serif" font-size="8" fill="#64748b" text-anchor="middle">Scan to install</text>
    <!-- Home indicator -->
    <rect x="96" y="462" width="48" height="4" rx="2" fill="#cbd5e1"/>
  </g>
</svg>
