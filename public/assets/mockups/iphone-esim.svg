<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 480" fill="none">
  <defs>
    <linearGradient id="iphoneBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="greenGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#01db5d" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#01db5d" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Body -->
  <rect x="12" y="4" width="216" height="472" rx="32" fill="#0f172a" stroke="#1e293b" stroke-width="2"/>
  <rect x="16" y="8" width="208" height="464" rx="28" fill="url(#iphoneBg)"/>
  <!-- Notch -->
  <rect x="90" y="10" width="60" height="22" rx="11" fill="#0a0a1a"/>
  <circle cx="112" cy="21" r="4" fill="#1e293b"/>
  <circle cx="128" cy="21" r="2" fill="#01db5d" opacity="0.8"/>
  <!-- Status bar -->
  <text x="30" y="42" font-family="system-ui,sans-serif" font-size="9" font-weight="600" fill="#64748b">9:41</text>
  <text x="190" y="42" font-family="system-ui,sans-serif" font-size="9" font-weight="600" fill="#64748b">5G</text>
  <!-- Header -->
  <rect x="24" y="56" width="192" height="44" rx="10" fill="url(#greenGlow)"/>
  <text x="42" y="84" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#fff">Settings</text>
  <text x="120" y="84" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#fff"/>
  <!-- Back button -->
  <text x="42" y="66" font-family="system-ui,sans-serif" font-size="10" fill="#01db5d">&lt; Cellular</text>
  <!-- SIM row -->
  <rect x="24" y="108" width="192" height="50" rx="10" fill="rgba(1,219,93,.08)"/>
  <text x="42" y="130" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#fff">Add eSIM</text>
  <text x="42" y="146" font-family="system-ui,sans-serif" font-size="9" fill="#64748b">Scan QR code or enter details</text>
  <text x="196" y="130" font-family="system-ui,sans-serif" font-size="10" fill="#01db5d">&gt;</text>
  <!-- Plan rows -->
  <rect x="24" y="166" width="192" height="36" rx="8" fill="rgba(255,255,255,.03)"/>
  <text x="42" y="188" font-family="system-ui,sans-serif" font-size="11" font-weight="500" fill="#fff">Current Plan</text>
  <text x="160" y="188" font-family="system-ui,sans-serif" font-size="11" fill="#01db5d">DataSafari</text>
  <rect x="24" y="206" width="192" height="36" rx="8" fill="rgba(255,255,255,.03)"/>
  <text x="42" y="228" font-family="system-ui,sans-serif" font-size="11" font-weight="500" fill="#fff">Data Roaming</text>
  <text x="180" y="228" font-family="system-ui,sans-serif" font-size="11" fill="#01db5d">On</text>
  <rect x="24" y="246" width="192" height="36" rx="8" fill="rgba(255,255,255,.03)"/>
  <text x="42" y="268" font-family="system-ui,sans-serif" font-size="11" font-weight="500" fill="#fff">Network</text>
  <text x="170" y="268" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">Auto</text>
  <!-- QR code preview -->
  <rect x="60" y="296" width="120" height="120" rx="12" fill="rgba(255,255,255,.04)" stroke="rgba(1,219,93,.2)" stroke-width="1" stroke-dasharray="4 4"/>
  <g transform="translate(82,318)" fill="none" stroke="#01db5d" stroke-width="2.5" stroke-linecap="round">
    <rect x="2" y="2" width="16" height="16" rx="2"/>
    <rect x="4" y="4" width="12" height="12" rx="1" fill="rgba(1,219,93,.06)"/>
    <rect x="6" y="6" width="4" height="4" rx="0.5" fill="#01db5d" opacity="0.4"/>
    <rect x="12" y="6" width="2" height="2" rx="0.3" fill="#01db5d" opacity="0.4"/>
    <rect x="6" y="12" width="2" height="2" rx="0.3" fill="#01db5d" opacity="0.4"/>
    <rect x="28" y="2" width="16" height="16" rx="2"/>
    <rect x="30" y="4" width="12" height="12" rx="1" fill="rgba(1,219,93,.06)"/>
    <rect x="32" y="6" width="8" height="8" rx="1" fill="#01db5d" opacity="0.4"/>
    <rect x="2" y="28" width="16" height="16" rx="2"/>
    <rect x="4" y="30" width="12" height="12" rx="1" fill="rgba(1,219,93,.06)"/>
    <rect x="6" y="32" width="4" height="4" rx="0.5" fill="#01db5d" opacity="0.4"/>
    <rect x="12" y="32" width="2" height="2" rx="0.3" fill="#01db5d" opacity="0.4"/>
    <rect x="12" y="42" width="2" height="2" rx="0.3" fill="#01db5d" opacity="0.4"/>
    <rect x="28" y="28" width="8" height="8" rx="1" fill="#01db5d" opacity="0.4"/>
    <rect x="38" y="28" width="6" height="6" rx="1" fill="#01db5d" opacity="0.3"/>
    <rect x="28" y="38" width="6" height="6" rx="1" fill="#01db5d" opacity="0.3"/>
    <rect x="38" y="38" width="6" height="6" rx="1" fill="#01db5d" opacity="0.4"/>
  </g>
  <text x="74" y="460" font-family="system-ui,sans-serif" font-size="8" fill="#64748b" text-anchor="middle">Scan QR code to install</text>
  <!-- Home indicator -->
  <rect x="90" y="468" width="60" height="4" rx="2" fill="rgba(255,255,255,.12)"/>
</svg>
